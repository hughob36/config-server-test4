server:
  port: 8080

spring:
  cloud:
    gateway:
      # 1. Configuración de Webflux (filtros globales)
      server:
        webflux:
          default-filters:
            - name: RewritePath
              args:
                regexp: "^/.*?/(?<remaining>.*)$"
                replacement: "/${remaining}"
      # 2. Configuración del Localizador (FUERA de server.webflux)
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

# Configuración de Eureka y optimización de red
eureka:
  instance:
    # Solución al log: "Cannot determine local hostname"
    hostname: localhost
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    # Opcional: para que el Gateway refresque rápido su lista de servicios
    fetch-registry: true
    register-with-eureka: true

# Para que puedas ver logs detallados si algo falla en el ruteo
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG